schema_version: 34
http:
  address: "0.0.0.0:8030"
  session_ttl: 720h
  pprof:
    enabled: false
    port: 6060
dns:
  port: 53
  bind_hosts:
    - 0.0.0.0
    - "::"
  upstream_dns:
    # 让 OpenClash 真正接管域名：用 domain-specific 上游把全部常规查询路由到 OC 的 DNS(7874)，
    # OC 在解析期即拿到域名、规则分流生效。裸 127.0.0.1 会被 ADGH 视为私有上游、仅作 PTR，故必须用 [/./] 形式。
    - "[/./]127.0.0.1:7874"
  # 兜底（仅当 OC DNS 不可达/超时才启用，绝不并行抢占）：国内 DoT，守住“OC 挂掉也不致 DNS 全断”底线
  fallback_dns:
    - "tls://223.5.5.5"
    - "tls://223.6.6.6"
  # 关闭并行请求：确保只走 OC 上游，fallback 仅在 OC 失败后才用（避免国内上游抢答绕过 OC 分流）
  parallel_requests: false
  upstream_timeout: 3s
  cache_enabled: true
  cache_size: 500000
  cache_optimistic_ttl: 30s
  cache_optimistic_max_age: 12h
  enable_dnssec: false
filtering:
  protection_enabled: true
  filtering_enabled: true
  blocking_mode: default
  blocked_response_ttl: 3600
  blocked_services:
    ids: []
  parental_enabled: false
  safebrowsing_enabled: false
  safebrowsing_cache_size: 1048576
  safesearch_cache_size: 1048576
  parental_cache_size: 1048576
  cache_time: 30
  filters_update_interval: 24
filters:
  - enabled: true
    url: "https://adguardteam.github.io/HostlistsRegistry/assets/filter_21.txt"
    name: "Anti-AD-CHN"
    id: 1
  - enabled: true
    url: "https://easylist-downloads.adblockplus.org/easylistchina+easylist.txt"
    name: "EasyList China"
    id: 2
  - enabled: true
    url: "https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt"
    name: "AdGuard DNS filter"
    id: 3
  - enabled: true
    url: "https://anti-ad.net/easylist.txt"
    name: "Anti-AD"
    id: 4
whitelist_filters: []
user_rules: []
querylog:
  enabled: true
  # 关掉落盘查询日志：ADGH 数据目录在 overlay 闪存，长期写入会撑爆分区导致系统不稳（间歇断流）
  file_enabled: false
  interval: 2160h
  size_memory: 1000
statistics:
  enabled: true
  interval: 24h
  results: 1000
dhcp:
  enabled: false
users:
  - name: admin
    password: "$2b$10$ZEL7fGN0sordgM10nFnFfOh4lfdPXLLJhYeuNfymetjErfPNM9yxe"
