name: ImmortalWrt x86_64

on:
  workflow_dispatch:
    inputs:
      version: {description: '版本', required: true, type: choice, options: [25.12.0, 24.10.1, 24.10.2, 24.10.3, 24.10.4, 24.10.5, 24.10.6]}
      profile: {description: '配置', required: true, type: choice, options: [mini-bypass, default-main, full-main]}
      custom_ip: {description: '自定义IP', type: string, default: ''}
      custom_gateway: {description: '网关(旁路由)', type: string, default: ''}
      pppoe_username: {description: 'PPPoE账号', type: string, default: ''}
      pppoe_password: {description: 'PPPoE密码', type: string, default: ''}
      install_oaf: {description: '安装OAF', type: boolean, default: false}
      root_password: {description: 'root密码', type: string, default: ''}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置缓存
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            openwrt/.git
            openwrt/feeds
            openwrt/dl
          key: build-cache-${{ inputs.version }}-${{ hashFiles('scripts/diy.sh', 'configs/*.config') }}

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: 获取源码
        run: |
          IFS="-" read -r CONFIG_TYPE PROFILE_TYPE <<< "${{ inputs.profile }}"
          VERSION=${{ inputs.version }}
          
          echo "--- 编译参数 ---"
          echo "版本: $VERSION"
          echo "配置: $CONFIG_TYPE-$PROFILE_TYPE"
          [[ -n "${{ inputs.custom_ip }}" ]] && echo "自定义IP: ${{ inputs.custom_ip }}" || echo "自定义IP: (使用默认)"
          [[ -n "${{ inputs.custom_gateway }}" ]] && echo "自定义网关: ${{ inputs.custom_gateway }}" || echo "自定义网关: (使用默认)"
          [[ -n "${{ inputs.pppoe_username }}" ]] && echo "PPPoE账号: ${{ inputs.pppoe_username }}"
          [[ -n "${{ inputs.root_password }}" ]] && echo "root密码: 已设置"
          echo "----------------"
          
          {
            echo "RELEASE_TAG=$VERSION"
            echo "VERSION_MAJOR=${VERSION%.*}"
            echo "CONFIG_FILE=${VERSION_MAJOR}-${CONFIG_TYPE}.config"
            echo "PROFILE_TYPE=$PROFILE_TYPE"
            printf 'CUSTOM_IP=%s\n' "${{ inputs.custom_ip }}"
            printf 'CUSTOM_GATEWAY=%s\n' "${{ inputs.custom_gateway }}"
            printf 'PPPOE_USERNAME=%s\n' "${{ inputs.pppoe_username }}"
            printf 'PPPOE_PASSWORD=%s\n' "${{ inputs.pppoe_password }}"
            printf 'ROOT_PASSWORD=%s\n' "${{ inputs.root_password }}"
            printf 'INSTALL_OAF=%s\n' "${{ inputs.install_oaf }}"
          } >> $GITHUB_ENV

          [[ ! -d openwrt/.git ]] && rm -rf openwrt && git clone --depth 1 --branch "v$VERSION" https://github.com/immortalwrt/immortalWrt openwrt || (cd openwrt && git fetch && git checkout "v$VERSION")

      - name: 配置与编译
        run: |
          cd openwrt
          chmod +x "$GITHUB_WORKSPACE/scripts/diy.sh"
          
          "$GITHUB_WORKSPACE/scripts/diy.sh" -v "$VERSION_MAJOR" -p before
          
          # 【只加了调试输出，完全不改变你原有逻辑】
          echo "正在查找配置文件: $GITHUB_WORKSPACE/configs/$CONFIG_FILE"
          ls "$GITHUB_WORKSPACE/configs/"
          
          [ -f "$GITHUB_WORKSPACE/configs/$CONFIG_FILE" ] && cp "$GITHUB_WORKSPACE/configs/$CONFIG_FILE" .config || { echo "错误: 配置文件不存在" >&2; exit 1; }
          
          oaf_args=(-v "$VERSION_MAJOR" -p oaf -t "$PROFILE_TYPE")
          [[ "$INSTALL_OAF" == "true" ]] && oaf_args+=(--install-oaf)
          "$GITHUB_WORKSPACE/scripts/diy.sh" "${oaf_args[@]}"
          
          ./scripts/feeds install -a
          
          args=(-v "$VERSION_MAJOR" -p after -t "$PROFILE_TYPE")
          [[ -n "$CUSTOM_IP" ]] && args+=(--ip "$CUSTOM_IP")
          [[ "$PROFILE_TYPE" == "bypass" && -n "$CUSTOM_GATEWAY" ]] && args+=(--gateway "$CUSTOM_GATEWAY")
          [[ "$PROFILE_TYPE" == "main" && -n "$PPPOE_USERNAME" && -n "$PPPOE_PASSWORD" ]] && args+=(--pppoe-user "$PPPOE_USERNAME" --pppoe-pass "$PPPOE_PASSWORD")
          [[ -n "$ROOT_PASSWORD" ]] && args+=(--root-pass "$ROOT_PASSWORD")
          "$GITHUB_WORKSPACE/scripts/diy.sh" "${args[@]}"
          
          make defconfig && make download -j$(nproc)
          make -j$(nproc) V=s || make -j1 V=s

      - name: 上传固件
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt x86_64 ${{ env.RELEASE_TAG }} (${{ env.PROFILE_TYPE }})
          tag_name: ${{ env.RELEASE_TAG }}-${{ env.PROFILE_TYPE }}-${{ github.run_id }}
          files: openwrt/bin/targets/x86/64/*combined*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}