name: ImmortalWrt x86_64

on:
  workflow_dispatch:
    inputs:
      version:
        description: '选择精确发布版本'
        required: true
        type: choice
        options:
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
          - 25.12.0
      profile:
        description: '选择配置文件'
        required: true
        type: choice
        options:
          - mini-bypass
          - default-main
          - full-main
      custom_ip:
        description: '自定义 IP 地址'
        required: false
        type: string
        default: ''
      pppoe_username:
        description: 'PPPoE 账号'
        required: false
        type: string
        default: ''
      pppoe_password:
        description: 'PPPoE 密码'
        required: false
        type: string
        default: ''
      custom_feeds:
        description: '是否加载自定义 feeds'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化环境变量
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PROFILE="${{ github.event.inputs.profile }}"
          IFS="-" read -r CONFIG_TYPE PROFILE_TYPE <<< "$PROFILE"
          VERSION_MAJOR=${VERSION%.*}
          FINAL_CONFIG="${VERSION_MAJOR}-${CONFIG_TYPE}.config"

          echo "RELEASE_TAG=$VERSION" >> $GITHUB_ENV
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
          echo "CONFIG_FILE=$FINAL_CONFIG" >> $GITHUB_ENV
          echo "PROFILE_TYPE=$PROFILE_TYPE" >> $GITHUB_ENV
          echo "CUSTOM_IP=${{ github.event.inputs.custom_ip }}" >> $GITHUB_ENV
          echo "PPPOE_USER=${{ github.event.inputs.pppoe_username }}" >> $GITHUB_ENV
          echo "PPPOE_PASS=${{ github.event.inputs.pppoe_password }}" >> $GITHUB_ENV
          echo "CUSTOM_FEEDS=${{ github.event.inputs.custom_feeds }}" >> $GITHUB_ENV

      - name: 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: 克隆 ImmortalWrt 源码
        run: |
          sudo rm -rf openwrt
          git clone https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          git fetch --tags
          git checkout "v$RELEASE_TAG"

      - name: 编译前置配置
        run: |
          cd openwrt
          chmod +x "$GITHUB_WORKSPACE/scripts/diy.sh"

          # 执行前置 DIY
          "$GITHUB_WORKSPACE/scripts/diy.sh" -v "${VERSION_MAJOR}" -p before ${CUSTOM_FEEDS:+--custom-feeds}

          # 加载配置 & 更新 feeds
          cp "$GITHUB_WORKSPACE/configs/${CONFIG_FILE}" .config
          ./scripts/feeds update -a

          # ==============================================
          # 删除 feeds 里自带的 oaf
          # ==============================================
          rm -rf package/feeds/packages/oaf
          rm -rf package/feeds/packages/luci-app-oaf
          rm -rf package/feeds/packages/open-app-filter
          rm -rf feeds/packages/net/oaf
          rm -rf feeds/packages/net/open-app-filter

          ./scripts/feeds install -a

          # ==================== OAF 官方安装 ====================
          if [[ "$PROFILE_TYPE" == "main" && "$CUSTOM_FEEDS" == "true" ]]; then
            git clone https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter
            echo "CONFIG_PACKAGE_luci-app-oaf=y" >> .config
          fi

          # 执行后置 DIY
          args=(-v "${VERSION_MAJOR}" -p after -t "${PROFILE_TYPE}")
          [[ -n "$CUSTOM_IP" ]] && args+=(--ip "$CUSTOM_IP")
          [[ -n "$PPPOE_USER" && -n "$PPPOE_PASS" ]] && args+=(--pppoe-user "$PPPOE_USER" --pppoe-pass "$PPPOE_PASS")
          [[ "$CUSTOM_FEEDS" == "true" ]] && args+=(--custom-feeds)
          "$GITHUB_WORKSPACE/scripts/diy.sh" "${args[@]}"

      - name: 生成配置并下载依赖
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: 上传固件到 Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt x86_64 ${{ env.RELEASE_TAG }} (${{ env.PROFILE_TYPE }})
          tag_name: ${{ env.RELEASE_TAG }}-${{ env.PROFILE_TYPE }}
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}