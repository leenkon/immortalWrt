name: ImmortalWrt x86_64

on:
  workflow_dispatch:
    inputs:
      version:
        description: '选择精确发布版本'
        required: true
        type: choice
        options:
          - 25.12.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
      profile:
        description: '选择配置文件'
        required: true
        type: choice
        options:
          - mini-bypass
          - default-main
          - full-main
      custom_ip:
        description: '自定义 IP 地址'
        required: false
        type: string
        default: ''
      custom_gateway:
        description: '自定义网关(旁路由模式必填，指向主路由IP)'
        required: false
        type: string
        default: ''
      pppoe_username:
        description: 'PPPoE账号'
        required: false
        type: string
        default: ''
      pppoe_password:
        description: 'PPPoE密码'
        required: false
        type: string
        default: ''
      install_oaf:
        description: '安装OpenAppFilter(OAF)'
        required: true
        type: boolean
        default: false
      root_password:
        description: '设置root密码（默认无需密码）'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化环境变量
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_PROFILE: ${{ github.event.inputs.profile }}
          INPUT_CUSTOM_IP: ${{ github.event.inputs.custom_ip }}
          INPUT_CUSTOM_GATEWAY: ${{ github.event.inputs.custom_gateway }}
          INPUT_PPPOE_USER: ${{ github.event.inputs.pppoe_username }}
          INPUT_PPPOE_PASS: ${{ github.event.inputs.pppoe_password }}
          INPUT_INSTALL_OAF: ${{ github.event.inputs.install_oaf }}
          INPUT_ROOT_PASSWORD: ${{ github.event.inputs.root_password }}
        run: |
          set -e
          VERSION="$INPUT_VERSION"
          PROFILE="$INPUT_PROFILE"
          IFS="-" read -r CONFIG_TYPE PROFILE_TYPE <<< "$PROFILE"
          VERSION_MAJOR=${VERSION%.*}
          FINAL_CONFIG="${VERSION_MAJOR}-${CONFIG_TYPE}.config"

          echo "RELEASE_TAG=$VERSION" >> $GITHUB_ENV
          echo "RUN_TIMESTAMP=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
          echo "CONFIG_FILE=$FINAL_CONFIG" >> $GITHUB_ENV
          echo "PROFILE_TYPE=$PROFILE_TYPE" >> $GITHUB_ENV
          echo "INSTALL_OAF=$INPUT_INSTALL_OAF" >> $GITHUB_ENV

          # 用循环 + heredoc 安全写入可能含特殊字符的值
          for var in CUSTOM_IP CUSTOM_GATEWAY PPPOE_USER PPPOE_PASS ROOT_PASSWORD; do
            eval "val=\${INPUT_$var}"
            {
              echo "${var}<<'EOF_VAR'"
              echo "$val"
              echo "EOF_VAR"
            } >> $GITHUB_ENV
          done

      - name: 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: 克隆 ImmortalWrt 源码
        run: |
          sudo rm -rf openwrt
          git clone https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          git fetch --tags
          git checkout "v$RELEASE_TAG"

      - name: 编译前置配置
        run: |
          set -e
          cd openwrt
          chmod +x "$GITHUB_WORKSPACE/scripts/diy.sh"

          "$GITHUB_WORKSPACE/scripts/diy.sh" -v "${VERSION_MAJOR}" -p before

          CONFIG_SRC="$GITHUB_WORKSPACE/configs/${CONFIG_FILE}"
          if [ ! -f "$CONFIG_SRC" ]; then
            echo "错误: 配置文件不存在: $CONFIG_SRC" >&2
            exit 1
          fi
          cp "$CONFIG_SRC" .config
          echo "✓ 已加载配置: ${CONFIG_FILE}"

          ./scripts/feeds update -a

          oaf_args=(-v "${VERSION_MAJOR}" -p oaf -t "${PROFILE_TYPE}")
          [[ "$INSTALL_OAF" == "true" ]] && oaf_args+=(--install-oaf)
          "$GITHUB_WORKSPACE/scripts/diy.sh" "${oaf_args[@]}"

          ./scripts/feeds install -a

          args=(-v "${VERSION_MAJOR}" -p after -t "${PROFILE_TYPE}")
          [[ -n "$CUSTOM_IP" ]] && args+=(--ip "$CUSTOM_IP")
          [[ "$PROFILE_TYPE" == "bypass" && -n "$CUSTOM_GATEWAY" ]] && args+=(--gateway "$CUSTOM_GATEWAY")
          [[ "$PROFILE_TYPE" == "main" && -n "$PPPOE_USER" && -n "$PPPOE_PASS" ]] && args+=(--pppoe-user "$PPPOE_USER" --pppoe-pass "$PPPOE_PASS")
          [[ -n "$ROOT_PASSWORD" ]] && args+=(--root-pass "$ROOT_PASSWORD")
          "$GITHUB_WORKSPACE/scripts/diy.sh" "${args[@]}"

      - name: 生成配置并下载依赖
        run: |
          set -e
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: 开始编译固件
        run: |
          set -e
          cd openwrt
          make -j$(nproc) V=s || { echo "并行构建失败，退回单线程重试..."; make -j1 V=s; }

      - name: 收集固件作为 Artifact
        run: |
          set -e
          mkdir -p artifacts
          cp openwrt/bin/targets/x86/64/*combined*.img.gz artifacts/ 2>/dev/null || true
          ls -lh artifacts/ || true

      - name: 上传 Artifact（无论 Release 是否成功）
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.RELEASE_TAG }}-${{ env.PROFILE_TYPE }}-${{ env.RUN_TIMESTAMP }}
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 30

      - name: 上传固件到 Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt x86_64 ${{ env.RELEASE_TAG }} (${{ env.PROFILE_TYPE }}) ${{ env.RUN_TIMESTAMP }}
          tag_name: ${{ env.RELEASE_TAG }}-${{ env.PROFILE_TYPE }}-${{ env.RUN_TIMESTAMP }}
          files: openwrt/bin/targets/x86/64/*combined*.img.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
