name: ImmortalWrt_Builder_x86_64
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
    inputs:
      version:
        description: '编译版本'
        required: true
        type: choice
        options:
          - 25.12.0
          - 24.10.6
          - 24.10.5
          - 24.10.4
          - 24.10.3
          - 24.10.2
          - 24.10.1
      profile:
        description: '配置文件'
        required: true
        type: choice
        options:
          - mini-bypass
          - default-main
          - full-main
      custom_ip:
        description: '自定义IP'
        type: string
        default: ''
      custom_gateway:
        description: '网关(旁路由)'
        type: string
        default: ''
      pppoe_username:
        description: 'PPPoE账号'
        type: string
        default: ''
      pppoe_password:
        description: 'PPPoE密码'
        type: string
        default: ''
      install_oaf:
        description: '安装OAF应用过滤'
        type: boolean
        default: false
      root_password:
        description: 'Root密码'
        type: string
        default: ''
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 检出项目代码
        uses: actions/checkout@v4

      # 独立步骤：解析全局变量（全程不切换目录，变量永久生效）
      - name: 初始化全局变量
        run: |
          IFS="-" read -r CONFIG_TYPE PROFILE_TYPE << "${{ inputs.profile }}"
          VERSION="${{ inputs.version }}"
          VERSION_MAJOR="${VERSION%.*}"
          CONFIG_FILE="${VERSION_MAJOR}.config"
          FULL_TAG="v${VERSION}"

          # 写入全局环境变量
          echo "RELEASE_TAG=$VERSION" >> $GITHUB_ENV
          echo "FULL_TAG=$FULL_TAG" >> $GITHUB_ENV
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
          echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
          echo "PROFILE_TYPE=$PROFILE_TYPE" >> $GITHUB_ENV
          echo "CUSTOM_IP=${{ inputs.custom_ip }}" >> $GITHUB_ENV
          echo "CUSTOM_GATEWAY=${{ inputs.custom_gateway }}" >> $GITHUB_ENV
          echo "PPPOE_USERNAME=${{ inputs.pppoe_username }}" >> $GITHUB_ENV
          echo "PPPOE_PASSWORD=${{ inputs.pppoe_password }}" >> $GITHUB_ENV
          echo "ROOT_PASSWORD=${{ inputs.root_password }}" >> $GITHUB_ENV
          echo "INSTALL_OAF=${{ inputs.install_oaf }}" >> $GITHUB_ENV

      # 独立步骤：克隆源码 + 切换标签（隔离目录，变量绝对稳定）
      - name: 克隆并切换 ImmortalWrt 版本
        run: |
          sudo rm -rf openwrt
          git clone https://github.com/immortalwrt/immortalwrt openwrt
          [ ! -d "openwrt" ] && echo "错误：openwrt 目录创建失败" && exit 1
          cd openwrt
          git fetch --tags
          echo "目标标签: ${FULL_TAG}"
          git checkout "${FULL_TAG}"

      # 合并步骤：依赖安装 + diy前后置 + feeds + OAF部署 + 冲突清理
      - name: 编译前置全配置
        run: |
          # 安装编译依赖
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev

          cd openwrt
          chmod +x "$GITHUB_WORKSPACE/scripts/diy.sh"

          # 执行 diy before（已修复卡死问题）
          DIY_ARGS=(-v "$VERSION_MAJOR" -p before -t "$PROFILE_TYPE")
          [[ "$INSTALL_OAF" == "true" ]] && DIY_ARGS+=(--install-oaf)
          "$GITHUB_WORKSPACE/scripts/diy.sh"

          # 标准feeds操作
          ./scripts/feeds install -a
          cp "$GITHUB_WORKSPACE/configs/${CONFIG_FILE}" .config

          # 部署OAF + 导入自定义配置/图标
          if [[ "$INSTALL_OAF" == "true" && "$PROFILE_TYPE" == "main" ]]; then
            git clone https://github.com/destan19/OpenAppFilter package/OpenAppFilter
            PROJECT_ROOT="$GITHUB_WORKSPACE"
            if [[ -d "$PROJECT_ROOT/oaf_files" ]]; then
              [[ -f "$PROJECT_ROOT/oaf_files/feature.cfg" ]] && cp -f "$PROJECT_ROOT/oaf_files/feature.cfg" package/OpenAppFilter/open-app-filter/files/
              if [[ -d "$PROJECT_ROOT/oaf_files/app_icons" ]]; then
                mkdir -p package/OpenAppFilter/luci-app-oaf/htdocs/luci-static/resources/
                cp -rf "$PROJECT_ROOT/oaf_files/app_icons" package/OpenAppFilter/luci-app-oaf/htdocs/luci-static/resources/
              fi
            fi
            echo "CONFIG_PACKAGE_luci-app-oaf=y" >> .config
          fi

          # 彻底清理feeds内置OAF，解决循环依赖
          rm -rf package/feeds/packages/oaf \
                 package/feeds/packages/luci-app-oaf \
                 package/feeds/packages/open-app-filter 2>/dev/null
          sed -i '/CONFIG_PACKAGE.*oaf/d' .config

          # 执行 diy after
          AFTER_ARGS=(-v "$VERSION_MAJOR" -p after -t "$PROFILE_TYPE")
          [[ -n "$CUSTOM_IP" ]] && AFTER_ARGS+=(--ip "$CUSTOM_IP")
          [[ -n "$CUSTOM_GATEWAY" ]] && AFTER_ARGS+=(--gateway "$CUSTOM_GATEWAY")
          [[ -n "$PPPOE_USERNAME" && -n "$PPPOE_PASSWORD" ]] && AFTER_ARGS+=(--pppoe-user "$PPPOE_USERNAME")
          [[ -n "$ROOT_PASSWORD" ]] && AFTER_ARGS+=(--root-pass "$ROOT_PASSWORD")
          "$GITHUB_WORKSPACE/scripts/diy.sh" "${AFTER_ARGS}"

      # 合并步骤：生成配置 + 下载依赖 + 编译固件
      - name: 编译固件
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)
          make -j$(nproc) V=s || make -j1 V=s

      # 发布固件到Release
      - name: 上传固件
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt ${{ env.RELEASE_TAG }} (${{ env.PROFILE_TYPE }})
          tag_name: ${{ env.RELEASE_TAG }}-${{ env.PROFILE_TYPE }}
          files: |
            openwrt/bin/targets/x86/64/*squashfs-combined.img.gz
            openwrt/bin/targets/x86/64/*ext4-combined.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
