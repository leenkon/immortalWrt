name: ImmortalWrt Builder

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: main  # ✅ 已修正：从 master 改为 main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create cache directories
      run: |
        mkdir -p openwrt/dl openwrt/ccache

    - name: Setup cache
      uses: actions/cache@v3
      with:
        path: |
          openwrt/dl
          openwrt/ccache
        key: ${{ runner.os }}-immortalwrt-${{ hashFiles('$FEEDS_CONF', '$CONFIG_FILE') }}
        restore-keys: |
          ${{ runner.os }}-immortalwrt-

    - name: Initialization environment
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint \
          binutils bison build-essential bzip2 ccache clang cmake cpio curl \
          device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 \
          libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev \
          libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
          python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync \
          scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev zstd
        sudo timedatectl set-timezone "$TZ"
        echo "CCACHE_DIR=$GITHUB_WORKSPACE/openwrt/ccache" >> $GITHUB_ENV
        ccache --max-size=2G

    - name: Clone source code
      run: |
        echo "正在克隆 ImmortalWrt 源码..."
        echo "仓库: $REPO_URL"
        echo "分支: $REPO_BRANCH"
        
        if [ ! -d "openwrt" ]; then
          git clone --depth 1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
        else
          cd openwrt
          git fetch --depth 1 origin "$REPO_BRANCH"
          git reset --hard origin/$REPO_BRANCH
        fi

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        [ -x "$DIY_P1_SH" ] && cd openwrt && $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a

    - name: Install feeds
      run: |
        cd openwrt
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -d "files" ] && cp -r files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        [ -x "$DIY_P2_SH" ] && cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      run: |
        cd openwrt
        make defconfig
        make download -j$(($(nproc) + 1)) || make download -j1
        find dl -size -1024c -delete

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo "::group::Compilation Log"
        make -j$(($(nproc) + 1)) || make V=s
        echo "::endgroup::"
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

    - name: Upload bin directory
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_bin_${{ env.FILE_DATE }}
        path: openwrt/bin
        retention-days: 3

    - name: Organize files
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      run: |
        cd openwrt/bin/targets
        TARGET_DIR=$(find . -maxdepth 2 -mindepth 2 -type d | head -1 || find . -maxdepth 1 -mindepth 1 -type d | head -1)
        [ -d "$TARGET_DIR" ] && cd "$TARGET_DIR" && rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Generate SHA256 checksums
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      run: |
        cd "$FIRMWARE"
        find . -maxdepth 1 -type f -name "*.bin" -o -name "*.img" -o -name "*.gz" | while read file; do
          sha256sum "$file" > "$file.sha256sum"
        done

    - name: Create Release
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build_${{ env.FILE_DATE }}
        name: ImmortalWrt Build ${{ env.FILE_DATE }}
        body: |
          Auto-built ImmortalWrt firmware
          Date: ${{ env.FILE_DATE }}
        files: ${{ env.FIRMWARE }}/*
