name: ImmortalWrt Builder

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup environment
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential ccache git python3 python3-pip

    - name: Clone ImmortalWrt source
      run: |
        echo "Cloning ImmortalWrt repository..."
        git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git -b main openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        [ -x "$DIY_P1_SH" ] && cd openwrt && $GITHUB_WORKSPACE/$DIY_P1_SH || true

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -d "files" ] && cp -r files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        [ -x "$DIY_P2_SH" ] && cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH || true

    - name: Download packages
      run: |
        cd openwrt
        make defconfig
        make download -j$(($(nproc) + 1))

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(($(nproc) + 1))

    - name: Upload firmware
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-firmware
        path: openwrt/bin/targets/
        retention-days: 2
