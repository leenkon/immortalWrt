name: ImmortalWrtBuilder_x86_64
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
    inputs:
      version: {description: '版本', required: true, type: choice, options: [25.12.1, 25.12.0, 24.10.6, 24.10.1]}
      profile: {description: '配置', required: true, type: choice, options: [mini-bypass, default-main, full-main, full-noadgh]}
      custom_ip: {description: '自定义IP', type: string, default: ''}
      custom_gateway: {description: '网关(旁路由)', type: string, default: ''}
      bypass_ip: {description: '旁路路由IP(主路由DNS转发目标)', type: string, default: ''}
      pppoe_username: {description: 'PPPoE账号', type: string, default: ''}
      pppoe_password: {description: 'PPPoE密码', type: string, default: ''}
      install_oaf: {description: '安装OAF', type: boolean, default: false}
      root_password: {description: 'root密码', type: string, default: ''}
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          path: .

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 拉取源码
        run: |
          set -e
          rm -rf openwrt
          timeout 180 git clone --depth 1 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          timeout 60 git fetch origin tag v${{ github.event.inputs.version }} --depth 1
          git checkout v${{ github.event.inputs.version }}

      - name: 配置与编译
        id: build
        run: |
          set -e
          # 修复 Windows 提交可能带来的 CRLF（路由器 ash 不兼容）
          find $GITHUB_WORKSPACE -type f \( -name "*.sh" -o -name "*.yaml" -o -name "dns-hijack" -o -name "99-adgh-filters" \) \
            -exec sed -i 's/\r$//' {} + 2>/dev/null || true
          cd openwrt
          IFS='-' read -r CFG_PREFIX RUN_TYPE <<< "${{ github.event.inputs.profile }}"
          [[ "$CFG_PREFIX" == "full" ]] && RUN_TYPE="full"
          NO_ADGH=false; [[ "${{ github.event.inputs.profile }}" == *"noadgh"* ]] && NO_ADGH=true
          MAIN_VER="${{ github.event.inputs.version }}"; MAIN_VER="${MAIN_VER%.*}"
          # OAF：主路由勾选或完整路由必装；OC 装 bypass/full（含 noadgh）；
          # ADGH：bypass / full（非 noadgh）包含；24.x 用 feeds 自带版本，25.x 自动升最新（配套升 Go）；
          # noadgh 的“无 ADGH”在 .config 阶段剔除。
          [[ ("${{ github.event.inputs.install_oaf }}" == "true" && "$RUN_TYPE" == "main") || "$RUN_TYPE" == "full" ]] && INSTALL_OAF=true || INSTALL_OAF=false
          WITH_OC=false; WITH_ADGH=false
          case "$RUN_TYPE" in
            bypass) WITH_OC=true; WITH_ADGH=true;;
            full)   WITH_OC=true; WITH_ADGH=true; [[ "$NO_ADGH" == "true" ]] && WITH_ADGH=false;;
          esac

          chmod +x $GITHUB_WORKSPACE/scripts/diy.sh
          $GITHUB_WORKSPACE/scripts/diy.sh -v $MAIN_VER -p before -t $RUN_TYPE
          ./scripts/feeds update -a

          if $INSTALL_OAF; then
            rm -rf package/{luci-app-oaf,open-app-filter,oaf} feeds/packages/{net/open-app-filter,luci/luci-app-oaf,kernel/oaf} package/OpenAppFilter
            timeout 120 git clone --depth 1 https://github.com/destan19/OpenAppFilter package/OpenAppFilter
            cp -f $GITHUB_WORKSPACE/oaf_files/feature.cfg package/OpenAppFilter/open-app-filter/files/
            cp -rf $GITHUB_WORKSPACE/oaf_files/app_icons/ package/OpenAppFilter/luci-app-oaf/htdocs/luci-static/resources/
          fi

          # OpenClash LuCI 替换：bypass / full（含 noadgh）均需要
          if $WITH_OC; then
            chmod +x $GITHUB_WORKSPACE/scripts/upgrade-openclash-luci.sh
            $GITHUB_WORKSPACE/scripts/upgrade-openclash-luci.sh .
          fi
          # AdGuardHome 升级：仅 25.x 且实际包含 ADGH（bypass / full 非 noadgh）时，
          # 自动升到最新版并配套升级 feeds Go（解决 .built 的 Go 版本不匹配）；
          # 24.x 直接用 feeds 自带版本（Go 太旧无法升，求稳）。
          if $WITH_ADGH && [[ "$MAIN_VER" == "25" ]]; then
            chmod +x $GITHUB_WORKSPACE/scripts/upgrade-{adgh,golang}.sh
            $GITHUB_WORKSPACE/scripts/upgrade-adgh.sh . --version latest
          fi

          ./scripts/feeds install -a
          cp $GITHUB_WORKSPACE/configs/${MAIN_VER}-${CFG_PREFIX}.config .config
          # noadgh：构建期即从 .config 剔除 AdGuardHome 三个包；普通 full 不受影响
          [[ "$NO_ADGH" == "true" ]] && sed -i '/CONFIG_PACKAGE_.*adguardhome/d' .config || true
          $INSTALL_OAF && echo -e "\nCONFIG_PACKAGE_luci-app-oaf=y" >> .config || true
          ROOTPWD="${{ github.event.inputs.root_password }}"; ROOTPWD="${ROOTPWD:-password}"
          CIP="${{ github.event.inputs.custom_ip }}"; CGW="${{ github.event.inputs.custom_gateway }}"
          BIP="${{ github.event.inputs.bypass_ip }}"
          PUSER="${{ github.event.inputs.pppoe_username }}"; PPASS="${{ github.event.inputs.pppoe_password }}"
          $GITHUB_WORKSPACE/scripts/diy.sh -v $MAIN_VER -p after -t $RUN_TYPE \
            ${CIP:+--ip "$CIP"} ${CGW:+--gateway "$CGW"} \
            ${PUSER:+--pppoe-user "$PUSER"} ${PPASS:+--pppoe-pass "$PPASS"} \
            --root-pass "$ROOTPWD"

          $WITH_OC && { chmod +x $GITHUB_WORKSPACE/scripts/upgrade-openclash-core.sh; $GITHUB_WORKSPACE/scripts/upgrade-openclash-core.sh $GITHUB_WORKSPACE; } || true
          [[ -d "$GITHUB_WORKSPACE/files" ]] && { rm -rf files; cp -rf "$GITHUB_WORKSPACE/files/" .; } || true

          # 按 profile 删除不需要的静态文件（在 openwrt 副本上操作，不修改源树）
          case "$RUN_TYPE" in
            main)   rm -rf files/etc/{adguardhome,openclash};;
            bypass) rm -f files/usr/sbin/dns-hijack;;
            full)   ;;
          esac
          # bxplug：25.x=apk, 24.x=ipk, 清理与当前版本不匹配的格式
          BXPLUG_VER="${MAIN_VER%%.*}"
          case "$BXPLUG_VER" in
            25) rm -f files/etc/bxplug.ipk;;
            24) rm -f files/etc/bxplug.apk;;
            *)  rm -f files/etc/bxplug.{ipk,apk};;
          esac
          find files/ -type f \( -path "*/sbin/*" -o -path "*/hotplug.d/*" -o -path "*/uci-defaults/*" -o -name "*.sh" \) -exec chmod 755 {} + 2>/dev/null || true
          make defconfig && make download && make clean
          make -j$(nproc) || make -j1 V=s
          TS=$(date +%Y%m%d%H%M%S)
          echo "timestamp=$TS" >> $GITHUB_OUTPUT
          shopt -s nullglob; for f in bin/targets/x86/64/*combined.img.gz; do mv "$f" "${f%.img.gz}-$TS.img.gz"; done; shopt -u nullglob

      - name: 上传固件
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt ${{ github.event.inputs.version }} (${{ github.event.inputs.profile }})
          tag_name: ${{ github.event.inputs.version }}-${{ github.event.inputs.profile }}
          files: openwrt/bin/targets/x86/64/*-${{ steps.build.outputs.timestamp }}.img.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
