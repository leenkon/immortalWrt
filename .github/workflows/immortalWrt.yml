name: ImmortalWrt Builder

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/openwrt/ccache
  DL_DIR: ${{ github.workspace }}/openwrt/dl

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180  # 添加超时限制

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  # 显式声明浅克隆

    - name: Setup build environment
      run: |
        mkdir -p $CCACHE_DIR $DL_DIR
        
        echo "::group::Installing dependencies"
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zst
        echo "::endgroup::"

        sudo timedatectl set-timezone "$TZ"
        ccache --max-size=2G
        ccache --show-stats

    - name: Restore build cache
      uses: actions/cache@v3
      id: cache
      with:
        path: |
          ${{ env.CCACHE_DIR }}
          ${{ env.DL_DIR }}
        key: ${{ runner.os }}-immortalwrt-${{ hashFiles('feeds.conf.default', '.config') }}
        restore-keys: |
          ${{ runner.os }}-immortalwrt-

    - name: Prepare source code
      run: |
        rm -rf openwrt
        git clone --depth 1 --single-branch -b "$REPO_BRANCH" "$REPO_URL" openwrt

        [ -f "$FEEDS_CONF" ] && cp "$FEEDS_CONF" openwrt/feeds.conf.default
        [ -d "files" ] && cp -rf files openwrt/files
        [ -f "$CONFIG_FILE" ] && cp "$CONFIG_FILE" openwrt/.config

        if [ -x "$DIY_P1_SH" ]; then
          cd openwrt
          bash "../$DIY_P1_SH" || { echo "DIY script failed"; exit 1; }
        fi

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a || { echo "Feeds update failed"; exit 1; }
        ./scripts/feeds install -a || { echo "Feeds install failed"; exit 1; }

        if [ -x "../$DIY_P2_SH" ]; then
          bash "../$DIY_P2_SH" || { echo "DIY stage2 failed"; exit 1; }
        fi

    - name: Build firmware
      id: build
      run: |
        cd openwrt
        
        echo "::group::Download packages"
        for i in {1..3}; do
          make download -j$(($(nproc) + 1)) && break || sleep 10
          [ $i -eq 3 ] && exit 1
        done
        find dl -size -1024c -delete 2>/dev/null || true
        echo "::endgroup::"

        echo "::group::Compilation log"
        make -j$(($(nproc) + 1)) V=w || {
          echo "Parallel build failed, retrying single-threaded...";
          make -j1 V=w || exit 1;
        }
        echo "::endgroup::"

        echo "status=success" >> $GITHUB_OUTPUT

    - name: Save cache
      if: always()
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.CCACHE_DIR }}
          ${{ env.DL_DIR }}
        key: ${{ steps.cache.outputs.cache-primary-key }}

    - name: Create Release
      if: steps.build.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ env.REPO_BRANCH }}-$(date +%Y%m%d)
        name: Build (${{ env.REPO_BRANCH }}) - $(date +'%Y-%m-%d')
        files: |
          openwrt/bin/targets/**/*

    - name: Upload artifacts
      if: steps.build.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && env.UPLOAD_RELEASE != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/targets/
        retention-days: 7
