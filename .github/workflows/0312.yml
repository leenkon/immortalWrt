name: ImmortalWrt 24.10 云编译

on:
  workflow_dispatch:
    inputs:
      target:
        description: '目标架构 (如 x86_64, ramips/mt7621)'
        required: true
        default: 'x86_64'
        type: string
      subtarget:
        description: '子目标'
        required: false
        default: ''
        type: string
      profile:
        description: '设备型号'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/openwrt/ccache
  DL_DIR: ${{ github.workspace }}/openwrt/dl

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    strategy:
      matrix:
        include:
          - target: ${{ github.event.inputs.target || 'x86_64' }}
            subtarget: ${{ github.event.inputs.subtarget || '' }}
            profile: ${{ github.event.inputs.profile || '' }}

    steps:
    - name: 检查仓库代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        path: config-files

    - name: 设置构建环境
      run: |
        echo "::group::创建缓存目录"
        mkdir -p $CCACHE_DIR $DL_DIR
        echo "::endgroup::"
        
        echo "::group::安装编译依赖"
        sudo apt-get update -y
        sudo apt-get install -y \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
          gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man libncurses-dev \
          libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch \
          pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils re2c rsync \
          scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
          xmlto xxd zlib1g-dev zstd
        echo "::endgroup::"
        
        sudo timedatectl set-timezone "$TZ"
        ccache --max-size=4G
        ccache --cleanup
        ccache --show-stats

    - name: 恢复构建缓存
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.CCACHE_DIR }}
          ${{ env.DL_DIR }}
        key: ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.target }}-${{ hashFiles('config-files/feeds.conf.default', 'config-files/.config') }}
        restore-keys: |
          ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.target }}-
          ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-
          ${{ runner.os }}-immortalwrt-

    - name: 准备源码
      run: |
        echo "::group::克隆ImmortalWrt源码"
        rm -rf openwrt
        git clone --depth 1 --single-branch -b "$REPO_BRANCH" "$REPO_URL" openwrt
        echo "::endgroup::"
        
        echo "::group::应用配置文件"
        cd openwrt
        
        # 复制feeds配置文件
        if [ -f "../config-files/$FEEDS_CONF" ]; then
          cp "../config-files/$FEEDS_CONF" feeds.conf.default
          echo "已应用自定义feeds配置"
        else
          # 使用默认feeds配置
          cat > feeds.conf.default << 'EOF'
          src-git packages https://github.com/immortalwrt/packages.git
          src-git luci https://github.com/immortalwrt/luci.git
          src-git routing https://github.com/openwrt/routing.git
          src-git telephony https://github.com/openwrt/telephony.git
          EOF
          echo "使用默认feeds配置"
        fi
        
        # 复制其他配置文件
        [ -d "../config-files/files" ] && cp -rf "../config-files/files" .
        [ -f "../config-files/$CONFIG_FILE" ] && cp "../config-files/$CONFIG_FILE" .config
        
        echo "::endgroup::"
        
        # 运行自定义脚本第一部分
        if [ -f "../config-files/$DIY_P1_SH" ]; then
          echo "::group::运行自定义脚本 (第一阶段)"
          chmod +x "../config-files/$DIY_P1_SH"
          bash "../config-files/$DIY_P1_SH" || { echo "DIY脚本第一阶段执行失败"; exit 1; }
          echo "::endgroup::"
        fi

    - name: 更新和安装Feeds
      run: |
        cd openwrt
        
        echo "::group::更新Feeds源"
        for i in {1..3}; do
          ./scripts/feeds update -a && break
          [ $i -eq 3 ] && { echo "更新feeds失败，达到最大重试次数"; exit 1; }
          echo "第 $i 次更新feeds失败，10秒后重试..."
          sleep 10
        done
        echo "::endgroup::"
        
        echo "::group::安装Feeds包"
        ./scripts/feeds install -a
        
        # 检查并安装关键包（如果存在）
        REQUIRED_PKGS="luci luci-i18n-base-zh-cn libpam libtirpc"
        for pkg in $REQUIRED_PKGS; do
          if ./scripts/feeds list | grep -q "^$pkg"; then
            echo "安装关键包: $pkg"
            ./scripts/feeds install $pkg || echo "注意: $pkg 安装出现问题"
          else
            echo "警告: $pkg 在feeds中未找到"
          fi
        done
        echo "::endgroup::"
        
        # 运行自定义脚本第二部分
        if [ -f "../config-files/$DIY_P2_SH" ]; then
          echo "::group::运行自定义脚本 (第二阶段)"
          chmod +x "../config-files/$DIY_P2_SH"
          bash "../config-files/$DIY_P2_SH" || { echo "DIY脚本第二阶段执行失败"; exit 1; }
          echo "::endgroup::"
        fi

    - name: 配置编译选项
      run: |
        cd openwrt
        
        echo "::group::配置验证和设置"
        
        # 如果没有.config文件，先生成默认配置
        if [ ! -f .config ]; then
          echo "生成默认配置..."
          make defconfig
          echo "已生成默认配置"
        else
          echo "使用已有的.config文件"
        fi
        
        # 设置目标架构
        if [ -n "${{ matrix.target }}" ]; then
          echo "设置目标架构: ${{ matrix.target }}"
          
          # 首先清理旧的配置行
          sed -i '/^CONFIG_TARGET_[a-zA-Z0-9_]*=y$/d' .config
          sed -i '/^CONFIG_TARGET_ARCH_PACKAGES=/d' .config
          sed -i '/^CONFIG_TARGET_BOARD=/d' .config
          sed -i '/^CONFIG_TARGET_SUBTARGET=/d' .config
          sed -i '/^CONFIG_TARGET_PROFILE=/d' .config
          
          # 设置新的目标架构
          if [ "${{ matrix.target }}" = "x86_64" ] || [ "${{ matrix.target }}" = "x86" ]; then
            # x86_64 架构
            echo "CONFIG_TARGET_x86=y" >> .config
            echo "CONFIG_TARGET_x86_64=y" >> .config
            echo 'CONFIG_TARGET_ARCH_PACKAGES="x86_64"' >> .config
            echo 'CONFIG_TARGET_BOARD="x86"' >> .config
            echo 'CONFIG_TARGET_SUBTARGET="64"' >> .config
          elif [ "${{ matrix.target }}" = "ramips" ] || [[ "${{ matrix.target }}" == ramips/* ]]; then
            # ramips 架构
            echo "CONFIG_TARGET_ramips=y" >> .config
            echo 'CONFIG_TARGET_ARCH_PACKAGES="mipsel_24kc"' >> .config
            echo 'CONFIG_TARGET_BOARD="ramips"' >> .config
            echo 'CONFIG_TARGET_SUBTARGET="mt7621"' >> .config
          elif [ "${{ matrix.target }}" = "rockchip" ] || [[ "${{ matrix.target }}" == rockchip/* ]]; then
            # rockchip 架构
            echo "CONFIG_TARGET_rockchip=y" >> .config
            echo 'CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"' >> .config
            echo 'CONFIG_TARGET_BOARD="rockchip"' >> .config
            echo 'CONFIG_TARGET_SUBTARGET="armv8"' >> .config
          else
            # 其他架构
            echo "CONFIG_TARGET_${{ matrix.target }}=y" >> .config
          fi
          
          # 设置子目标
          if [ -n "${{ matrix.subtarget }}" ]; then
            echo "设置子目标: ${{ matrix.subtarget }}"
            echo "CONFIG_TARGET_SUBTARGET=\"${{ matrix.subtarget }}\"" >> .config
          fi
          
          # 设置设备型号
          if [ -n "${{ matrix.profile }}" ]; then
            echo "设置设备型号: ${{ matrix.profile }}"
            echo "CONFIG_TARGET_PROFILE=\"${{ matrix.profile }}\"" >> .config
          fi
        fi
        
        # 确保启用关键组件
        echo "确保关键组件已启用"
        CRITICAL_PACKAGES="luci luci-i18n-base-zh-cn libpam libtirpc"
        for pkg in $CRITICAL_PACKAGES; do
          # 将包名转换为配置变量名（替换-为_）
          config_var="CONFIG_PACKAGE_$(echo "$pkg" | tr '-' '_')"
          
          # 如果配置被禁用，则启用它
          if grep -q "^${config_var}=[mn]" .config 2>/dev/null; then
            sed -i "s/^${config_var}=[mn]/${config_var}=y/" .config
            echo "启用: $pkg (${config_var})"
          elif ! grep -q "^${config_var}=y" .config 2>/dev/null; then
            echo "${config_var}=y" >> .config
            echo "添加: $pkg (${config_var})"
          fi
        done
        
        # 移除重复行并排序
        sort -u .config -o .config
        
        echo "::endgroup::"
        
        echo "::group::验证配置"
        echo "关键配置检查:"
        grep -E "^CONFIG_TARGET|^CONFIG_PACKAGE_luci|^CONFIG_PACKAGE_libpam|^CONFIG_PACKAGE_libtirpc" .config || true
        echo "::endgroup::"

    - name: 下载软件包
      run: |
        cd openwrt
        
        echo "::group::下载软件包"
        for i in {1..3}; do
          make download -j$(nproc) && break
          [ $i -eq 3 ] && { echo "下载失败，达到最大重试次数"; exit 1; }
          echo "第 $i 次下载失败，15秒后重试..."
          sleep 15
        done
        
        # 清理损坏的小文件
        find dl -size -1024c -delete 2>/dev/null || true
        echo "::endgroup::"

    - name: 编译固件
      run: |
        cd openwrt
        
        echo "::group::开始编译"
        if make -j$(nproc) V=s; then
          echo "编译成功"
        else
          echo "并行编译失败，尝试单线程编译..."
          if make -j1 V=sc 2>&1 | tee -a build.log; then
            echo "单线程编译成功"
          else
            echo "编译失败，检查错误日志"
            grep -i "error:" build.log | head -20
            exit 1
          fi
        fi
        echo "::endgroup::"
        
        echo "::group::编译统计"
        ccache --show-stats
        echo "固件生成在以下目录:"
        find bin/targets -name "*.bin" -o -name "*.img" -o -name "*.gz" | head -10
        echo "::endgroup::"

    - name: 保存缓存
      if: success()
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.CCACHE_DIR }}
          ${{ env.DL_DIR }}
        key: ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.target }}-${{ hashFiles('config-files/feeds.conf.default', 'config-files/.config') }}

    - name: 上传编译日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.target }}
        path: |
          openwrt/build.log
          openwrt/.config
          openwrt/config.seed
        retention-days: 7

    - name: 创建Release
      if: success()
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.target }}-$(date +%Y%m%d-%H%M)
        name: ImmortalWrt ${{ env.REPO_BRANCH }} - ${{ matrix.target }} - $(date +'%Y-%m-%d %H:%M')
        body: |
          ImmortalWrt ${{ env.REPO_BRANCH }} 固件
          目标架构: ${{ matrix.target }}
          子目标: ${{ matrix.subtarget || '默认' }}
          设备型号: ${{ matrix.profile || '默认' }}
          编译时间: $(date)
        files: |
          openwrt/bin/targets/**/*.bin
          openwrt/bin/targets/**/*.img
          openwrt/bin/targets/**/*.gz
          openwrt/bin/targets/**/*.manifest
        draft: false
        prerelease: false

    - name: 上传固件到Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.target }}
        path: |
          openwrt/bin/targets/
        retention-days: 30
        if-no-files-found: error
