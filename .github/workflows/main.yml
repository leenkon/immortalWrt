name: ImmortalWrt Builder

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/openwrt/ccache
  DL_DIR: ${{ github.workspace }}/openwrt/dl

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        path: src

    - name: Setup build environment
      run: |
        mkdir -p $CCACHE_DIR $DL_DIR
        
        echo "::group::Installing dependencies"
        sudo apt-get update -y
        sudo apt-get install -y \
          build-essential ccache clang cmake flex gawk gettext git libncurses-dev \
          libssl-dev python3 python3-pip python3-dev rsync unzip zlib1g-dev \
          libpam0g-dev libtirpc-dev libev-dev liblzma-dev libgpiod-dev \
          libglib2.0-dev libgmp3-dev libmpc-dev libmpfr-dev libyaml-dev \
          lld llvm ninja-build pkgconf zstd
        echo "::endgroup::"

        sudo timedatectl set-timezone "$TZ"
        ccache --max-size=2G
        ccache --show-stats

    - name: Restore build cache
      uses: actions/cache@v3
      id: cache
      with:
        path: |
          ${{ env.CCACHE_DIR }}
          ${{ env.DL_DIR }}
        key: ${{ runner.os }}-immortalwrt-${{ hashFiles('src/feeds.conf.default', 'src/.config') }}
        restore-keys: |
          ${{ runner.os }}-immortalwrt-

    - name: Prepare source code
      run: |
        rm -rf openwrt
        git clone --depth 1 --single-branch -b "$REPO_BRANCH" "$REPO_URL" openwrt

        # Copy configuration files
        [ -f "src/$FEEDS_CONF" ] && cp "src/$FEEDS_CONF" openwrt/feeds.conf.default
        [ -d "src/files" ] && cp -rf src/files openwrt/files
        [ -f "src/$CONFIG_FILE" ] && cp "src/$CONFIG_FILE" openwrt/.config

        # Apply custom scripts
        if [ -f "src/$DIY_P1_SH" ]; then
          chmod +x "src/$DIY_P1_SH"
          cd openwrt
          bash "../src/$DIY_P1_SH" || { echo "DIY script failed"; exit 1; }
          cd ..
        fi

    - name: Update feeds with critical dependencies
      run: |
        cd openwrt
        ./scripts/feeds update -a || { echo "Feeds update failed"; exit 1; }
        
        # Explicitly install commonly missing packages
        ./scripts/feeds install -a || echo "Continuing with partial feeds installation"
        
        # Critical packages that often fail silently
        REQUIRED_PKGS="luci luci-i18n-base-zh-cn libpam libtirpc lm-sensors libev liblzma libgpiod"
        for pkg in $REQUIRED_PKGS; do
          ./scripts/feeds install $pkg || echo "WARNING: Failed to install $pkg"
        done

        if [ -f "../src/$DIY_P2_SH" ]; then
          chmod +x "../src/$DIY_P2_SH"
          bash "../src/$DIY_P2_SH" || { echo "DIY stage2 failed"; exit 1; }
        fi

    - name: Build firmware
      id: build
      run: |
        cd openwrt
        
        echo "::group::Verify critical packages"
        grep -E 'CONFIG_PACKAGE_(luci|libpam|libtirpc)=y' .config || \
          echo "WARNING: Critical packages not enabled in config"
        echo "::endgroup::"

        echo "::group::Download packages"
        for i in {1..3}; do
          make download -j$(($(nproc) + 1)) && break || sleep 15
          [ $i -eq 3 ] && { echo "Download failed after 3 attempts"; exit 1; }
        done
        find dl -size -1024c -delete 2>/dev/null || true
        echo "::endgroup::"

        echo "::group::Compilation"
        make -j$(($(nproc) + 1)) V=s || {
          echo "Parallel build failed, retrying with debug..."
          make -j1 V=sc 2>&1 | tee build.log
          grep -i "error:" build.log && exit 1
        }
        echo "::endgroup::"

        echo "status=success" >> $GITHUB_OUTPUT

    - name: Save cache
      if: always()
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.CCACHE_DIR }}
          ${{ env.DL_DIR }}
        key: ${{ steps.cache.outputs.cache-primary-key }}

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          openwrt/build.log
          openwrt/config.seed
        retention-days: 3

    - name: Create Release
      if: steps.build.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ env.REPO_BRANCH }}-$(date +%Y%m%d)
        name: Build (${{ env.REPO_BRANCH }}) - $(date +'%Y-%m-%d')
        files: |
          openwrt/bin/targets/**/*

    - name: Upload artifacts
      if: steps.build.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && env.UPLOAD_RELEASE != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/targets/
        retention-days: 7
