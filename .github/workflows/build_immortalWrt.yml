name: ImmortalWrt Builder

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup environment and cache
      run: |
        # 创建缓存目录
        mkdir -p openwrt/dl openwrt/ccache
        
        # 使用ImmortalWrt官方一键安装脚本
        echo "::group::Installing build dependencies"
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        echo "::endgroup::"
        
        # 设置时区和ccache
        sudo timedatectl set-timezone "$TZ"
        echo "CCACHE_DIR=$GITHUB_WORKSPACE/openwrt/ccache" >> $GITHUB_ENV
        ccache --max-size=2G

    - name: Restore build cache
      uses: actions/cache@v3
      id: cache-restore
      with:
        path: |
          openwrt/dl
          openwrt/ccache
        key: ${{ runner.os }}-immortalwrt-${{ hashFiles('feeds.conf.default', '.config') }}
        restore-keys: |
          ${{ runner.os }}-immortalwrt-

    - name: Clone and configure source code
      run: |
        # 克隆源码
        rm -rf openwrt
        git clone --depth 1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
        
        # 加载自定义配置
        if [ -e "$FEEDS_CONF" ]; then
          cp "$FEEDS_CONF" openwrt/feeds.conf.default
        fi
        
        if [ -d "files" ]; then
          cp -r files openwrt/files
        fi
        
        if [ -e "$CONFIG_FILE" ]; then
          cp "$CONFIG_FILE" openwrt/.config
        fi
        
        # 执行自定义脚本
        if [ -x "$DIY_P1_SH" ]; then
          cd openwrt
          bash "$GITHUB_WORKSPACE/$DIY_P1_SH" || exit 1
        fi

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a        
        # 执行第二阶段自定义脚本
        if [ -x "$DIY_P2_SH" ]; then
          bash "$GITHUB_WORKSPACE/$DIY_P2_SH" || exit 1
        fi

    - name: Download and compile firmware
      id: compile
      run: |
        cd openwrt
        make defconfig        
        # 下载软件包
        echo "::group::下载软件包"
        make download -j$(($(nproc) + 1)) || make download -j1
        find dl -size -1024c -delete 2>/dev/null || true
        echo "::endgroup::"
        
        # 编译固件
        echo "::group::编译固件"
        make -j$(($(nproc) + 1)) V=w
        echo "::endgroup::"
        
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Save build cache
      if: always()
      uses: actions/cache@v3
      with:
        path: |
          openwrt/dl
          openwrt/ccache
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}

    - name: Create Release
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: immortalwrt-${{ env.REPO_BRANCH }}-$(date +%Y%m%d-%H%M%S)
        name: ImmortalWrt Build (${{ env.REPO_BRANCH }}) - $(date +'%Y-%m-%d %H:%M:%S')
        draft: false
        prerelease: true
        files: |
          openwrt/bin/targets/**/*.bin
          openwrt/bin/targets/**/*.img
          openwrt/bin/targets/**/*.gz
          openwrt/bin/targets/**/*.manifest
          openwrt/bin/targets/**/*.sha256sums
          openwrt/bin/targets/**/sha256sums

    - name: Upload firmware artifacts (fallback)
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && env.UPLOAD_RELEASE != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-firmware
        path: openwrt/bin/targets/
        retention-days: 7
