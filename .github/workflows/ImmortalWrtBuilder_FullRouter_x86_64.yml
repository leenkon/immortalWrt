name: ImmortalWrtBuilder_FullRouter_x86_64
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
    inputs:
      version: {description: '版本', required: true, type: choice, options: [25.12.0, 24.10.1, 24.10.2, 24.10.3, 24.10.4, 24.10.5, 24.10.6]}
      custom_ip: {description: '路由LAN IP', type: string, default: ''}
      pppoe_username: {description: 'PPPoE账号(可选)', type: string, default: ''}
      pppoe_password: {description: 'PPPoE密码(可选)', type: string, default: ''}
      root_password: {description: 'root密码', type: string, default: ''}
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          path: .

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 拉取源码
        run: |
          set -e
          rm -rf openwrt
          timeout 180 git clone --depth 1 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          timeout 60 git fetch origin tag v${{ github.event.inputs.version }} --depth 1
          git checkout v${{ github.event.inputs.version }}

      - name: 配置与编译
        id: build
        run: |
          set -e
          # 修复 Windows 提交可能带来的 CRLF（路由器 ash 不兼容）
          fix_line_endings() { for f in "$@"; do [[ -f "$f" ]] && grep -q $'\r' "$f" 2>/dev/null && sed -i 's/\r$//' "$f"; done; }
          fix_line_endings $GITHUB_WORKSPACE/scripts/diy.sh \
            $GITHUB_WORKSPACE/scripts/upgrade-adgh.sh \
            $GITHUB_WORKSPACE/scripts/upgrade-openclash-core.sh \
            $GITHUB_WORKSPACE/files/usr/sbin/dns-hijack \
            $GITHUB_WORKSPACE/files/usr/lib/ddns/update_aliyun_com.sh \
            $GITHUB_WORKSPACE/files/etc/adguardhome/adguardhome.yaml \
            $GITHUB_WORKSPACE/files/etc/adguardhome/adguardhome-full.yaml \
            $GITHUB_WORKSPACE/files/etc/openclash/custom/openclash_custom_overwrite.yaml \
            $GITHUB_WORKSPACE/files/etc/hotplug.d/iface/99-adgh-filters
          cd openwrt
          MAIN_VER="${{ github.event.inputs.version }}"
          MAIN_VER="${MAIN_VER%.*}"
          chmod +x $GITHUB_WORKSPACE/scripts/diy.sh
          $GITHUB_WORKSPACE/scripts/diy.sh -v $MAIN_VER -p before -t full
          ./scripts/feeds update -a

          # OAF: 始终安装（完整路由必需）
          rm -rf package/{luci-app-oaf,open-app-filter,oaf} feeds/packages/{net/open-app-filter,luci/luci-app-oaf,kernel/oaf}
          rm -rf package/OpenAppFilter
          timeout 120 git clone --depth 1 https://github.com/destan19/OpenAppFilter package/OpenAppFilter
          cp -f $GITHUB_WORKSPACE/oaf_files/feature.cfg package/OpenAppFilter/open-app-filter/files/
          cp -rf $GITHUB_WORKSPACE/oaf_files/app_icons/ package/OpenAppFilter/luci-app-oaf/htdocs/luci-static/resources/

          # AdGuardHome 版本升级（使用官方最新版编译）
          chmod +x $GITHUB_WORKSPACE/scripts/upgrade-adgh.sh
          $GITHUB_WORKSPACE/scripts/upgrade-adgh.sh .

          ./scripts/feeds install -a
          cp $GITHUB_WORKSPACE/configs/${MAIN_VER}-full.config .config
          # OAF 包已通过 git clone 安装，确保 .config 选中
          echo -e "\nCONFIG_PACKAGE_luci-app-oaf=y" >> .config

          ROOTPWD="${{ github.event.inputs.root_password }}"
          ROOTPWD="${ROOTPWD:-password}"
          CIP="${{ github.event.inputs.custom_ip }}"
          PUSER="${{ github.event.inputs.pppoe_username }}"
          PPASS="${{ github.event.inputs.pppoe_password }}"
          $GITHUB_WORKSPACE/scripts/diy.sh -v $MAIN_VER -p after -t full \
            ${CIP:+--ip "$CIP"} \
            ${PUSER:+--pppoe-user "$PUSER"} ${PPASS:+--pppoe-pass "$PPASS"} \
            --root-pass "$ROOTPWD"

          # OpenClash Meta 核心预装（完整路由也需要）
          chmod +x $GITHUB_WORKSPACE/scripts/upgrade-openclash-core.sh
          $GITHUB_WORKSPACE/scripts/upgrade-openclash-core.sh $GITHUB_WORKSPACE

          [[ -d "$GITHUB_WORKSPACE/files" ]] && { rm -rf files; cp -rf "$GITHUB_WORKSPACE/files" .; }
          # 替换 ADGH YAML（完整路由专用模板）
          cp $GITHUB_WORKSPACE/files/etc/adguardhome/adguardhome-full.yaml files/etc/adguardhome/adguardhome.yaml
          find files/ -type f \( -path "*/sbin/*" -o -path "*/hotplug.d/*" -o -path "*/uci-defaults/*" -o -name "*.sh" \) -exec chmod 755 {} + 2>/dev/null || true
          make defconfig && make download && make clean
          make -j$(nproc) || make -j1 V=s
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          shopt -s nullglob; for f in bin/targets/x86/64/*combined.img.gz; do mv "$f" "${f%.img.gz}-$TIMESTAMP.img.gz"; done; shopt -u nullglob

      - name: 上传固件
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt ${{ github.event.inputs.version }} (full-router)
          tag_name: ${{ github.event.inputs.version }}-full-router
          files: openwrt/bin/targets/x86/64/*-${{ steps.build.outputs.timestamp }}.img.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
