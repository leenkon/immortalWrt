name: ImmortalWrt x86_64

on:
  workflow_dispatch:
    inputs:
      version:
        description: '选择精确发布版本'
        required: true
        type: choice
        options:
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
          - 25.12.0
      profile:
        description: '选择配置文件'
        required: true
        type: choice
        options:
          - mini-bypass
          - default-main
          - full-main
      custom_ip:
        description: '自定义 IP 地址 (留空使用默认: 主路由10.10.10.1 / 旁路由10.10.10.99)'
        required: false
        type: string
        default: ''
      pppoe_username:
        description: 'PPPoE 账号 (可选，主路由使用)'
        required: false
        type: string
        default: ''
      pppoe_password:
        description: 'PPPoE 密码 (可选，主路由使用)'
        required: false
        type: string
        default: ''
      custom_feeds:
        description: '是否加载自定义 feeds'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 自动匹配版本与配置文件
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PROFILE="${{ github.event.inputs.profile }}"
          CUSTOM_IP="${{ github.event.inputs.custom_ip }}"
          PPPOE_USERNAME="${{ github.event.inputs.pppoe_username }}"
          PPPOE_PASSWORD="${{ github.event.inputs.pppoe_password }}"
          echo "RELEASE_TAG=$VERSION" >> $GITHUB_ENV
          
          if [[ "$VERSION" == 24.10.* ]]; then
            VERSION_MAJOR="24.10"
          elif [[ "$VERSION" == 25.12.* ]]; then
            VERSION_MAJOR="25.12"
          fi
          
          IFS="-" read -r CONFIG_TYPE PROFILE_TYPE <<< "$PROFILE"
          FINAL_CONFIG="${VERSION_MAJOR}-${CONFIG_TYPE}.config"
          
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
          echo "CONFIG_FILE=$FINAL_CONFIG" >> $GITHUB_ENV
          echo "PROFILE_TYPE=$PROFILE_TYPE" >> $GITHUB_ENV
          echo "CUSTOM_IP=$CUSTOM_IP" >> $GITHUB_ENV
          echo "PPPOE_USERNAME=$PPPOE_USERNAME" >> $GITHUB_ENV
          echo "PPPOE_PASSWORD=$PPPOE_PASSWORD" >> $GITHUB_ENV
          echo "CUSTOM_FEEDS=${{ github.event.inputs.custom_feeds }}" >> $GITHUB_ENV

      - name: 清理环境
        run: sudo rm -rf openwrt

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: 克隆精确版本源码
        run: |
          git clone --depth=1 -b "v${RELEASE_TAG}" https://github.com/immortalwrt/immortalwrt openwrt

      - name: 执行更新 feeds 前的 DIY 操作
        run: |
          cd openwrt
          chmod +x "$GITHUB_WORKSPACE/scripts/diy.sh"
          if [[ "${{ github.event.inputs.custom_feeds }}" == "true" ]]; then
            "$GITHUB_WORKSPACE/scripts/diy.sh" -v "${VERSION_MAJOR}" -p before --custom-feeds
          else
            "$GITHUB_WORKSPACE/scripts/diy.sh" -v "${VERSION_MAJOR}" -p before
          fi

      - name: 应用配置文件
        run: |
          cd openwrt
          cp "$GITHUB_WORKSPACE/configs/${CONFIG_FILE}" .config

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 安装 OAF 包（仅主路由 + 自定义 feeds）
        if: env.PROFILE_TYPE == 'main' && env.CUSTOM_FEEDS == 'true'
        run: |
          cd openwrt
          ./scripts/feeds install open-app-filter luci-app-oaf

      - name: 执行更新 feeds 后的 DIY 操作
        run: |
          cd openwrt
          DIY_CMD="$GITHUB_WORKSPACE/scripts/diy.sh -v \"${VERSION_MAJOR}\" -p after -t \"${PROFILE_TYPE}\""
          [[ -n "$CUSTOM_IP" ]] && DIY_CMD="$DIY_CMD --ip \"$CUSTOM_IP\""
          [[ "$PROFILE_TYPE" == "main" && -n "$PPPOE_USERNAME" && -n "$PPPOE_PASSWORD" ]] && DIY_CMD="$DIY_CMD --pppoe-user \"$PPPOE_USERNAME\" --pppoe-pass \"$PPPOE_PASSWORD\""
          [[ "$CUSTOM_FEEDS" == "true" ]] && DIY_CMD="$DIY_CMD --custom-feeds"
          eval "$DIY_CMD"

      - name: 清理 OAF 递归依赖问题
        if: env.PROFILE_TYPE == 'main' && env.CUSTOM_FEEDS == 'true'
        run: |
          cd openwrt
          sed -i '/CONFIG_PACKAGE_kmod-oaf/d' .config
          sed -i '/CONFIG_PACKAGE_oaf/d' .config
          echo 'CONFIG_PACKAGE_open-app-filter=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-oaf=y' >> .config

      - name: 生成配置
        run: |
          cd openwrt
          make defconfig FORCE=1

      - name: 下载依赖
        run: cd openwrt && make download -j$(nproc)

      - name: 开始编译
        run: |
          cd openwrt
          make -j$(nproc) V=s FORCE=1 || make -j1 V=s FORCE=1

      - name: 发布固件到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt x86_64 ${{ env.RELEASE_TAG }} (${{ env.PROFILE_TYPE }})
          tag_name: ${{ env.RELEASE_TAG }}-${{ env.PROFILE_TYPE }}
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
