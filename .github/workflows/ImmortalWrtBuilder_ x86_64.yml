name: ImmortalWrtBuilder_x86_64
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
    inputs:
      version: {description: '版本', required: true, type: choice, options: [25.12.0, 24.10.1, 24.10.2, 24.10.3, 24.10.4, 24.10.5, 24.10.6]}
      profile: {description: '配置', required: true, type: choice, options: [mini-bypass, default-main, full-main]}
      custom_ip: {description: '自定义IP', type: string, default: ''}
      custom_gateway: {description: '网关(旁路由)', type: string, default: ''}
      pppoe_username: {description: 'PPPoE账号', type: string, default: ''}
      pppoe_password: {description: 'PPPoE密码', type: string, default: ''}
      install_oaf: {description: '安装OAF', type: boolean, default: false}
      root_password: {description: 'root密码', type: string, default: ''}
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 拉取源码
        run: |
          set -e
          rm -rf openwrt
          timeout 180 git clone --depth 1 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          timeout 60 git fetch origin tag v${{ github.event.inputs.version }} --depth 1
          git checkout v${{ github.event.inputs.version }}

      - name: 配置与编译
        id: build
        run: |
          set -e
          cd openwrt
          PROFILE=${{ github.event.inputs.profile }}
          IFS='-' read -r CFG_PREFIX RUN_TYPE <<< "$PROFILE"
          MAIN_VER=${{ github.event.inputs.version }}
          MAIN_VER=${MAIN_VER%.*}
          DIY=$GITHUB_WORKSPACE/scripts/diy.sh
          chmod +x $DIY
          cp $GITHUB_WORKSPACE/configs/${MAIN_VER}-${CFG_PREFIX}.config .config
          # ==================== Feeds 配置 ====================
          $DIY -v $MAIN_VER -p before -t $RUN_TYPE
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # ==================== OAF 安装（仅主路由） ====================
          if [[ "${{ github.event.inputs.install_oaf }}" == "true" && "$RUN_TYPE" == "main" ]]; then
            rm -rf package/luci-app-oaf package/open-app-filter package/oaf 2>/dev/null || true
            rm -rf feeds/packages/net/open-app-filter feeds/packages/luci/luci-app-oaf feeds/packages/kernel/oaf 2>/dev/null || true
            rm -rf package/OpenAppFilter 2>/dev/null || true
            timeout 120 git clone --depth 1 https://github.com/destan19/OpenAppFilter package/OpenAppFilter
            echo "CONFIG_PACKAGE_luci-app-oaf=y" >> .config
          fi
          CIP="${{ github.event.inputs.custom_ip }}"
          CGW="${{ github.event.inputs.custom_gateway }}"
          PUSER="${{ github.event.inputs.pppoe_username }}"
          PPASS="${{ github.event.inputs.pppoe_password }}"
          ROOTPWD="${{ github.event.inputs.root_password }}"
          ROOTPWD="${ROOTPWD:-password}"

          $DIY -v $MAIN_VER -p after -t $RUN_TYPE \
            ${CIP:+--ip "$CIP"} ${CGW:+--gateway "$CGW"} \
            ${PUSER:+--pppoe-user "$PUSER"} ${PPASS:+--pppoe-pass "$PPASS"} \
            --root-pass "$ROOTPWD"
          # ==================== 生成配置并编译 ====================
          make defconfig && make download
          make clean 2>/dev/null || true
          make -j$(nproc) || make -j1 V=s

      - name: 上传固件
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt ${{ github.event.inputs.version }} (${{ github.event.inputs.profile }})
          tag_name: ${{ github.event.inputs.version }}-${{ github.event.inputs.profile }}
          files: openwrt/bin/targets/x86/64/*combined.img.gz
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
